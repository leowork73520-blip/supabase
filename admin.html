<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@exampledev/new.css@1.1.2/new.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
        .Pending { background: #fff3cd; }
        .Approved { background: #d4edda; }
        .Rejected { background: #f8d7da; }
    </style>
</head>
<body>
    <div id="loginSection">
        <h1>Admin Login</h1>
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
    </div>

    <div id="adminSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Leads Dashboard</h1>
            <button onclick="logout()">Logout</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Message</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="leadsTable"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://decsarjhkrfvuxrsvzoo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HmrALuQ6Ta0lThN3AmZH_w_b2QQ9iSU';
        const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check Session on Load
        if (localStorage.getItem('isAdmin') === 'true') showDashboard();

        async function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            const { data, error } = await supabase.rpc('verify_admin_password', {
                target_username: user,
                typed_password: pass
            });

            if (data === true) {
                localStorage.setItem('isAdmin', 'true');
                showDashboard();
            } else {
                alert("Invalid Credentials");
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            fetchLeads();
        }

        async function fetchLeads() {
            const { data, error } = await supabase
                .from('contacts')
                .select('*')
                .order('submitted_at', { ascending: false });
            
            const tbody = document.getElementById('leadsTable');
            tbody.innerHTML = data.map(lead => `
                <tr>
                    <td>${new Date(lead.submitted_at).toLocaleDateString()}</td>
                    <td>${lead.name}<br><small>${lead.phone}</small></td>
                    <td>${lead.message || ''}</td>
                    <td><span class="status-badge ${lead.status}">${lead.status}</span></td>
                    <td>
                        <select onchange="updateStatus('${lead.id}', this.value)">
                            <option value="">Update...</option>
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approve</option>
                            <option value="Rejected">Reject</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, newStatus) {
            if (!newStatus) return;
            await supabase.from('contacts').update({ status: newStatus }).eq('id', id);
            fetchLeads();
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            location.reload();
        }
    </script>
</body>
</html>
