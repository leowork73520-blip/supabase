<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="login-section">
            <h1>Admin Login</h1>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="test@test.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="Test@123">
            </div>
            <button onclick="login()">Log In</button>
            <p id="error" style="color:red; display:none;"></p>
        </div>
        
        <div id="dashboard" style="display:none;">
            <h1>Dashboard</h1>
            <button onclick="logout()">Logout</button>
            <div id="requests"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabase = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.anonKey
        );

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                errorEl.textContent = 'Error: ' + error.message;
                errorEl.style.display = 'block';
                console.error(error);
            } else {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadRequests();
            }
        }

        async function loadRequests() {
            const { data } = await supabase.from('appointment_requests').select('*').order('created_at', { ascending: false });
            document.getElementById('requests').innerHTML = JSON.stringify(data, null, 2);
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
