<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Login Section (Visible before login) -->
        <div id="login-section">
            <h1>Admin Login</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" id="login-btn">Log In</button>
                <div id="login-error" class="error-message" style="display: none;"></div>
            </form>
        </div>

        <!-- Dashboard Section (Visible after login) -->
        <div id="dashboard-section" style="display: none;">
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <button id="logout-btn" class="btn-danger">Log Out</button>
            </div>
            <div id="admin-message-box" class="message-box" style="display: none;"></div>
            <div id="requests-container">
                <p>Loading requests...</p>
            </div>
        </div>
    </div>

    <!-- IMPORTANT: Scripts must load in this exact order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
