<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@exampledev/new.css@1.1.2/new.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Contact Support</h1>
    <form id="contactForm">
        <label>Name:</label>
        <input type="text" id="name" required>
        
        <label>Phone:</label>
        <input type="tel" id="phone" required>
        
        <label>Email:</label>
        <input type="email" id="email">
        
        <label>Message:</label>
        <textarea id="message" rows="4"></textarea>
        
        <button type="submit">Submit Request</button>
    </form>

    <script>
        // CONFIGURATION: Replace with your actual Supabase URL and Anon Key
        const SUPABASE_URL = 'https://decsarjhkrfvuxrsvzoo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HmrALuQ6Ta0lThN3AmZH_w_b2QQ9iSU';
        const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.from('contacts').insert([{
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            }]);

            if (error) alert("Error: " + error.message);
            else {
                alert("Thank you! Your message was sent.");
                document.getElementById('contactForm').reset();
            }
        });
    </script>
</body>
</html>
