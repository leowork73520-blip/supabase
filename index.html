<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — ContactHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --a:#667eea;--b:#764ba2;
      --text:#12122a;--muted:#64748b;--border:#e2e8f0;
      --ok:#10b981;--err:#ef4444;
      --r:16px;
    }
    body{
      font-family:'DM Sans',sans-serif;min-height:100vh;
      background:linear-gradient(135deg,var(--a) 0%,var(--b) 100%);
      display:flex;align-items:center;justify-content:center;
      padding:24px;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%,rgba(167,139,250,.3),transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 80%,rgba(96,165,250,.25),transparent 60%);
    }
    .card{
      background:#fff;border-radius:var(--r);
      box-shadow:0 24px 64px rgba(102,126,234,.18);
      width:100%;max-width:540px;padding:52px 48px;position:relative;
      animation:rise .55s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
    .card::after{
      content:'';position:absolute;top:0;left:48px;right:48px;height:4px;
      background:linear-gradient(90deg,var(--a),var(--b));border-radius:0 0 6px 6px;
    }
    .brand{display:flex;align-items:center;gap:11px;margin-bottom:32px}
    .ico{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a),var(--b));display:flex;align-items:center;justify-content:center;font-size:19px}
    .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--text)}
    h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.8px;color:var(--text);margin-bottom:8px}
    .sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:36px}
    .alert{display:none;align-items:flex-start;gap:11px;padding:14px 16px;border-radius:11px;font-size:13px;font-weight:500;margin-bottom:22px;border:1px solid transparent;animation:popIn .28s cubic-bezier(.16,1,.3,1)}
    .alert.show{display:flex}
    @keyframes popIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .alert-ok{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
    .alert-err{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    .ai{font-size:16px;flex-shrink:0;margin-top:1px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .fg{margin-bottom:20px}
    label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:7px}
    label .req{color:var(--err);margin-left:2px}
    input,textarea{width:100%;padding:12px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:#f8fafc;outline:none;transition:border-color .2s,box-shadow .2s,background .2s}
    input:focus,textarea:focus{border-color:var(--a);background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.13)}
    input.bad,textarea.bad{border-color:var(--err);box-shadow:0 0 0 3px rgba(239,68,68,.1)}
    textarea{resize:vertical;min-height:108px}
    .fe{font-size:12px;color:var(--err);margin-top:5px;display:none}
    .fe.on{display:block}
    .msg-wrap{position:relative}
    .char-count{position:absolute;bottom:10px;right:12px;font-size:11px;color:var(--muted);pointer-events:none}
    .btn{width:100%;padding:14px;margin-top:6px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.2px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .2s,transform .15s,box-shadow .2s}
    .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(102,126,234,.45)}
    .btn:active:not(:disabled){transform:translateY(0)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none;flex-shrink:0}
    @keyframes sp{to{transform:rotate(360deg)}}
    .btn.ld .spin{display:block}
    .admin-link{text-align:center;margin-top:30px;padding-top:22px;border-top:1px solid var(--border)}
    .admin-link a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
    .admin-link a:hover{color:var(--a)}
    .admin-link a strong{color:var(--b);font-weight:600}
    @media(max-width:500px){.card{padding:32px 22px}.row{grid-template-columns:1fr}.card::after{left:22px;right:22px}}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="ico">📬</div>
    <div class="brand-name">ContactHub</div>
  </div>
  <h1>Say Hello 👋</h1>
  <p class="sub">Drop your details and we'll be in touch quickly.</p>

  <div id="aOk" class="alert alert-ok"><span class="ai">✅</span><div>Message sent successfully! We'll be in touch.</div></div>
  <div id="aErr" class="alert alert-err"><span class="ai">⚠️</span><div id="aErrTxt">Something went wrong. Try again.</div></div>

  <form id="form" novalidate>
    <div class="row">
      <div class="fg">
        <label for="name">Full Name <span class="req">*</span></label>
        <input id="name" type="text" placeholder="jhon kumar" autocomplete="name"/>
        <div class="fe" id="e-name">Name is required.</div>
      </div>
      <div class="fg">
        <label for="phone">Phone <span class="req">*</span></label>
        <input id="phone" type="tel" placeholder="+91 9999999999" autocomplete="tel"/>
        <div class="fe" id="e-phone">Valid phone required.</div>
      </div>
    </div>
    <div class="fg">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@email.com" autocomplete="email"/>
      <div class="fe" id="e-email">Enter a valid email.</div>
    </div>
    <div class="fg">
      <label for="msg">Message</label>
      <div class="msg-wrap">
        <textarea id="msg" placeholder="What's on your mind?" maxlength="500" oninput="updateCount()"></textarea>
        <div class="char-count"><span id="cc">0</span>/500</div>
      </div>
    </div>
    <button type="submit" class="btn" id="sub">
      <div class="spin"></div>
      <span id="subTxt">Send Message →</span>
    </button>
  </form>

  <div class="admin-link">
    <a href="admin.html">Admin? <strong>Open Panel →</strong></a>
  </div>
</div>

<script>
// ════════════════════════════════════════
//   🔧 PASTE YOUR SUPABASE CREDENTIALS
// ════════════════════════════════════════
const SUPABASE_URL  = 'https://decsarjhkrfvuxrsvzoo.supabase.co';
const SUPABASE_ANON = 'sb_publishable_HmrALuQ6Ta0lThN3AmZH_w_b2QQ9iSU';
// ════════════════════════════════════════

const API = `${SUPABASE_URL}/rest/v1/contacts`;
const H = {
  'apikey': SUPABASE_ANON,
  'Authorization': `Bearer ${SUPABASE_ANON}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};
const $ = id => document.getElementById(id);

function updateCount(){ $('cc').textContent = $('msg').value.length }

function setErr(id, on){
  $(id).classList.toggle('bad', on);
  $('e-'+id).classList.toggle('on', on);
}

function validate(){
  const name  = $('name').value.trim();
  const phone = $('phone').value.trim();
  const email = $('email').value.trim();
  let ok = true;
  if(!name){ setErr('name',true); ok=false; } else setErr('name',false);
  if(!phone || !/^[+\d][\d\s\-(). ]{5,}$/.test(phone)){ setErr('phone',true); ok=false; } else setErr('phone',false);
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setErr('email',true); ok=false; } else setErr('email',false);
  return ok;
}

function setLoading(on){
  $('sub').disabled = on;
  $('sub').classList.toggle('ld', on);
  $('subTxt').textContent = on ? 'Sending…' : 'Send Message →';
}

function showAlert(type, msg){
  $('aOk').classList.remove('show');
  $('aErr').classList.remove('show');
  if(type==='ok'){
    $('aOk').classList.add('show');
    setTimeout(()=> $('aOk').classList.remove('show'), 5000);
  } else {
    $('aErrTxt').textContent = msg || 'Something went wrong.';
    $('aErr').classList.add('show');
  }
}

function saveLocal(data){
  const list = JSON.parse(localStorage.getItem('ch_contacts')||'[]');
  list.unshift({...data, id:Date.now(), status:'Pending', submitted_at:new Date().toISOString()});
  localStorage.setItem('ch_contacts', JSON.stringify(list));
  console.log('[CH] Saved to localStorage');
}

$('form').addEventListener('submit', async e => {
  e.preventDefault();
  if(!validate()) return;
  const payload = {
    name:         $('name').value.trim(),
    phone:        $('phone').value.trim(),
    email:        $('email').value.trim() || null,
    message:      $('msg').value.trim()   || null,
    status:       'Pending',
    submitted_at: new Date().toISOString()
  };
  console.log('[CH] Submitting:', payload);
  if(SUPABASE_URL.includes('YOUR_PROJECT_ID')){
    console.warn('[CH] Not configured — saving locally');
    saveLocal(payload); $('form').reset(); updateCount(); showAlert('ok'); return;
  }
  setLoading(true);
  try{
    const res = await fetch(API, {method:'POST', headers:H, body:JSON.stringify(payload)});
    if(!res.ok){ const e=await res.json(); throw new Error(e.message||`HTTP ${res.status}`); }
    console.log('[CH] Saved ✓');
    $('form').reset(); updateCount(); showAlert('ok');
  } catch(err){
    console.error('[CH] Error → localStorage:', err.message);
    saveLocal(payload); $('form').reset(); updateCount(); showAlert('ok');
  } finally{ setLoading(false); }
});
['name','phone','email'].forEach(id=> $(id).addEventListener('blur', validate));
</script>
</body>
</html>
