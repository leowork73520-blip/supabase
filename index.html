<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Request an Appointment</h1>
        <p class="subtitle">We'll call you back to confirm a time.</p>

        <form id="appointment-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" required autocomplete="tel">
            </div>

            <button type="submit" id="submit-btn">Submit Request</button>
        </form>

        <div id="message-box" class="message-box" style="display: none;"></div>

        <p class="privacy-note">
            <strong>Privacy Note:</strong> Your information is only used to contact you about your appointment and is not shared with third parties.
        </p>
    </div>

    <!-- IMPORTANT: Scripts must load in this exact order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
